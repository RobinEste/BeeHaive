# BeeHaive Docker Compose
# PostgreSQL service wordt in Fase 4 toegevoegd

services:
  neo4j:
    image: neo4j:5.18
    container_name: beehaive-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/beehaive-dev}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - ./neo4j-data:/data
    restart: unless-stopped
